<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Industrial RAG Assistant</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 780px;
      height: 90vh;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      padding: 18px 24px;
      background: #1a1a2e;
      color: #fff;
    }

    header h1 { font-size: 17px; font-weight: 600; }
    header p  { font-size: 12px; color: #9da5b4; margin-top: 3px; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }

    .msg.user  { align-self: flex-end; align-items: flex-end; }
    .msg.bot   { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: #1a1a2e;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.bot .bubble {
      background: #f0f2f5;
      color: #1a1a2e;
      border-bottom-left-radius: 4px;
    }

    .sources {
      font-size: 11px;
      color: #888;
      margin-top: 5px;
      padding: 0 4px;
    }

    .sources span {
      background: #e8eaf0;
      border-radius: 4px;
      padding: 2px 6px;
      margin-right: 4px;
    }

    .typing .bubble {
      color: #888;
      font-style: italic;
    }

    footer {
      padding: 16px 20px;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
    }

    #input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    #input:focus { border-color: #1a1a2e; }

    #send {
      padding: 12px 22px;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #send:disabled { opacity: 0.4; cursor: not-allowed; }
    #send:hover:not(:disabled) { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Industrial RAG Assistant</h1>
      <p>산업 문서 기반 AI 질의응답 시스템</p>
    </header>

    <div id="chat">
      <div class="msg bot">
        <div class="bubble">안녕하세요. 업로드된 산업 문서에 대해 질문해주세요.</div>
      </div>
    </div>

    <footer>
      <input id="input" type="text" placeholder="질문을 입력하세요..." />
      <button id="send">전송</button>
    </footer>
  </div>

  <script>
    const chat  = document.getElementById("chat");
    const input = document.getElementById("input");
    const send  = document.getElementById("send");

    function appendMsg(role, text, sources) {
      const wrap = document.createElement("div");
      wrap.className = `msg ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      wrap.appendChild(bubble);

      if (sources && sources.length > 0) {
        const src = document.createElement("div");
        src.className = "sources";
        sources.forEach(s => {
          const tag = document.createElement("span");
          tag.textContent = s.split("/").pop();
          src.appendChild(tag);
        });
        wrap.appendChild(src);
      }

      chat.appendChild(wrap);
      chat.scrollTop = chat.scrollHeight;
      return bubble;
    }

    async function ask() {
      const q = input.value.trim();
      if (!q) return;

      input.value = "";
      send.disabled = true;
      appendMsg("user", q);

      const typing = document.createElement("div");
      typing.className = "msg bot typing";
      typing.innerHTML = '<div class="bubble">답변 생성 중...</div>';
      chat.appendChild(typing);
      chat.scrollTop = chat.scrollHeight;

      try {
        const res = await fetch("/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question: q, top_k: 5 }),
        });
        const data = await res.json();
        chat.removeChild(typing);

        if (res.ok) {
          appendMsg("bot", data.answer, data.sources);
        } else {
          appendMsg("bot", `오류: ${data.detail}`);
        }
      } catch {
        chat.removeChild(typing);
        appendMsg("bot", "서버 연결에 실패했습니다.");
      }

      send.disabled = false;
      input.focus();
    }

    send.addEventListener("click", ask);
    input.addEventListener("keydown", e => { if (e.key === "Enter") ask(); });
  </script>
</body>
</html>
